<script>
    async function callAPI(endpoint, inputId, resId, dataKey) {
        const val = document.getElementById(inputId).value;
        const resDiv = document.getElementById(resId);
        if(!val) return;

        resDiv.classList.remove('hidden');
        resDiv.innerText = "L'IA réfléchit... (cela peut prendre 10s)";

        try {
            // On utilise des chemins relatifs pour éviter les problèmes d'URL
            const r = await fetch(`/api/${endpoint}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    // On envoie les deux noms pour être sûr que le backend comprenne
                    prompt: val,
                    messageHistory: val,
                    tone: 'seductive'
                })
            });
            
            const d = await r.json();
            console.log("Réponse reçue:", d);

            if(d.ok) {
                resDiv.innerText = d[dataKey] || d.text || d.suggestion;
            } else {
                resDiv.innerText = "Erreur IA: " + (d.error || "Problème inconnu");
            }
        } catch(e) {
            console.error("Erreur Fetch:", e);
            resDiv.innerText = "Erreur de connexion. Vérifie que le serveur est bien réveillé.";
        }
    }
</script>
